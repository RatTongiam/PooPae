<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SL-TTS Biomechanical Analyzer</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans p-6">

    <div class="max-w-6xl mx-auto bg-white p-8 rounded-xl shadow-md">
        <h1 class="text-3xl font-bold text-gray-900 mb-2">🏃‍♂️ Single-Leg Time to Stability (SL-TTS) Analyzer</h1>
        <p class="text-gray-600 mb-6">ระบบวิเคราะห์เสถียรภาพและพารามิเตอร์ชีวกลศาสตร์ในท่า Single Leg Deadlift (SLDL) ทำงานแบบ Client-side 100%</p>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6 p-4 bg-gray-100 rounded-lg">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Sampling Rate (Hz)</label>
                <input type="number" id="samplingRate" value="1000" class="w-full p-2 border border-gray-300 rounded bg-white">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Initial Contact Threshold (N)</label>
                <input type="number" id="contactThreshold" value="10" class="w-full p-2 border border-gray-300 rounded bg-white">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Stability Window (วินาที)</label>
                <input type="number" id="stabilityWindow" value="1" step="0.1" class="w-full p-2 border border-gray-300 rounded bg-white">
            </div>
        </div>

        <div class="mb-8">
            <label class="block text-sm font-semibold text-gray-700 mb-2">อัปโหลดไฟล์ข้อมูลดิบ (.csv)</label>
            <input type="file" id="csvFileInput" accept=".csv" class="w-full p-3 border-2 border-dashed border-gray-300 rounded-lg bg-gray-50 cursor-pointer hover:bg-gray-100">
        </div>

        <div id="resultsPanel" class="hidden grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-blue-50 p-5 rounded-lg border border-blue-200 shadow-sm">
                <span class="text-xs font-bold text-blue-600 uppercase tracking-wide">Kinetics Parameter</span>
                <div class="text-2xl font-bold mt-1" id="metricPeakForce">-</div>
                <div class="text-sm text-gray-500">Peak Force (แรงสูงสุด)</div>
                <div class="text-md font-semibold mt-2 text-gray-700" id="metricBW">-</div>
            </div>
            <div class="bg-purple-50 p-5 rounded-lg border border-purple-200 shadow-sm">
                <span class="text-xs font-bold text-purple-600 uppercase tracking-wide">Stability Control</span>
                <div class="text-2xl font-bold mt-1 text-purple-700" id="metricTTS">-</div>
                <div class="text-sm text-gray-500">Single-Leg Time to Stability</div>
                <div class="text-xs text-gray-500 mt-2" id="metricContactTime">-</div>
            </div>
            <div class="bg-green-50 p-5 rounded-lg border border-green-200 shadow-sm">
                <span class="text-xs font-bold text-green-600 uppercase tracking-wide">Kinematics Profile</span>
                <div class="text-sm font-semibold mt-1" id="metricSwayX">-</div>
                <div class="text-sm font-semibold" id="metricSwayY">-</div>
                <div class="text-sm font-semibold mt-2 text-gray-700" id="metricVelocity">-</div>
            </div>
        </div>

        <div class="relative h-[400px] w-full hidden" id="chartContainer">
            <canvas id="forceChart"></canvas>
        </div>
    </div>

    <script>
        let myChart = null;

        document.getElementById('csvFileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                processData(event.target.result);
            };
            reader.readAsText(file);
        });

        function processData(text) {
            const samplingRate = parseFloat(document.getElementById('samplingRate').value);
            const contactThreshold = parseFloat(document.getElementById('contactThreshold').value);
            const stabilityWindowSec = parseFloat(document.getElementById('stabilityWindow').value);
            const windowSize = Math.floor(stabilityWindowSec * samplingRate);

            const lines = text.split(/\r?\n/);
            if (lines.length < 2) return;

            const headers = lines[0].split(';');
            const idxForce = headers.indexOf('2 Newton');
            const idxSwayX = headers.indexOf('2 sway X');
            const idxSwayY = headers.indexOf('2 sway Y');
            const idxVelocity = headers.indexOf('2 velocity');
            const idxTime = headers.indexOf('timestamp');

            if (idxForce === -1) {
                alert("โครงสร้างไฟล์ไม่ถูกต้อง: ไม่พบคอลัมน์ '2 Newton'");
                return;
            }

            let timestamps = [];
            let forceData = [];
            let swayXData = [];
            let swayYData = [];
            let velocityData = [];

            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const cols = lines[i].split(';');
                if (cols.length < headers.length) continue;

                timestamps.push(parseFloat(cols[idxTime]));
                forceData.push(parseFloat(cols[idxForce]));
                swayXData.push(parseFloat(cols[idxSwayX]));
                swayYData.push(parseFloat(cols[idxSwayY]));
                velocityData.push(parseFloat(cols[idxVelocity]));
            }

            const timeSecs = timestamps.map(t => t / samplingRate);
            const peakForce = Math.max(...forceData);
            const maxVelocity = Math.max(...velocityData.map(Math.abs));
            
            const minSwayX = Math.min(...swayXData);
            const maxSwayX = Math.max(...swayXData);
            const minSwayY = Math.min(...swayYData);
            const maxSwayY = Math.max(...swayYData);

            let idxContact = forceData.findIndex(f => f >= contactThreshold);
            let tContactSec = null;
            let tStabilitySec = null;
            let slTtsSec = null;
            let bw = 0;
            let upperCombined = 0;
            let lowerCombined = 0;

            if (idxContact !== -1) {
                tContactSec = timeSecs[idxContact];
                const last100 = forceData.slice(-100);
                bw = last100.reduce((a, b) => a + b, 0) / last100.length;
                upperCombined = bw + (0.05 * bw);
                lowerCombined = bw - (0.05 * bw);

                for (let i = idxContact; i <= forceData.length - windowSize; i++) {
                    const window = forceData.slice(i, i + windowSize);
                    const isStable = window.every(f => f >= lowerCombined && f <= upperCombined);
                    if (isStable) {
                        tStabilitySec = timeSecs[i];
                        slTtsSec = tStabilitySec - tContactSec;
                        break;
                    }
                }
            }

            document.getElementById('metricPeakForce').innerText = `${peakForce.toFixed(2)} N`;
            document.getElementById('metricBW').innerText = bw > 0 ? `Body Weight อ้างอิง: ${bw.toFixed(2)} N` : `Body Weight อ้างอิง: -`;
            
            if (slTtsSec !== null) {
                document.getElementById('metricTTS').innerText = `${slTtsSec.toFixed(3)} วินาที`;
                document.getElementById('metricContactTime').innerText = `Initial Contact ที่: ${tContactSec.toFixed(3)} วินาที\nStability Onset ที่: ${tStabilitySec.toFixed(3)} วินาที`;
            } else {
                document.getElementById('metricTTS').innerText = `ไม่เข้าเกณฑ์คงที่`;
                document.getElementById('metricContactTime').innerText = idxContact !== -1 ? `Initial Contact ที่: ${tContactSec.toFixed(3)} วินาที` : `ไม่พบจุดปะทะแรง 10N`;
            }

            document.getElementById('metricSwayX').innerText = `↔️ Max Range Sway X: ${(maxSwayX - minSwayX).toFixed(2)}`;
            document.getElementById('metricSwayY').innerText = `↕️ Max Range Sway Y: ${(maxSwayY - minSwayY).toFixed(2)}`;
            document.getElementById('metricVelocity').innerText = `💨 Peak Velocity: ${maxVelocity.toFixed(6)} m/s`;

            document.getElementById('resultsPanel').classList.remove('hidden');
            document.getElementById('chartContainer').classList.remove('hidden');

            if (myChart) myChart.destroy();

            const ctx = document.getElementById('forceChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: timeSecs,
                    datasets: [{
                        label: 'Vertical Ground Reaction Force (N)',
                        data: forceData,
                        borderColor: '#7f7f7f',
                        borderWidth: 1.5,
                        pointRadius: 0,
                        fill: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { type: 'linear', title: { display: true, text: 'Time (Seconds)' } },
                        y: { title: { display: true, text: 'Force (Newtons)' } }
                    }
                }
            });
        }
    </script>
</body>
</html>
